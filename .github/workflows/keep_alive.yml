name: Keep Backend Alive

on:
  schedule:
    - cron: '*/10 * * * *' # Run every 10 minutes
  workflow_dispatch: # Allow manual trigger from the GitHub Actions tab

jobs:
  ping:
    name: Ping Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Health Endpoint
        run: |
          if [ -z "${{ secrets.RENDER_BACKEND_HOST }}" ]; then
            echo "Error: RENDER_BACKEND_HOST secret is not set in your GitHub repository."
            echo "Please add it in Settings -> Secrets and variables -> Actions"
            exit 1
          fi
          
          URL="https://${{ secrets.RENDER_BACKEND_HOST }}/health"
          echo "Pinging health endpoint: $URL"
          
          # Perform curl request and capture the HTTP status code
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
          echo "HTTP Response Status: $STATUS"
          
          if [ "$STATUS" -eq 200 ]; then
            echo "SUCCESS: Backend is awake and healthy!"
            exit 0
          else
            echo "WARNING: Backend returned status $STATUS. The service might be sleeping or offline."
            exit 1
          fi
